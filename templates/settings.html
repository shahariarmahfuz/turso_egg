{% extends "layout.html" %}
{% block page_title %}System Settings{% endblock %}
{% block page_subtitle %}Manage global configuration{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-body p-5 text-center">
                <i class="fas fa-cogs fa-4x text-muted mb-4"></i>
                <h4 class="fw-bold">Settings Panel</h4>
                <p class="text-muted">Global system configuration and environment variables will be available here.</p>
                <button class="btn btn-primary mt-3">Save Settings</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
