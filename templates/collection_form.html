{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <div class="mb-3 py-3">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Customer Collection</h6>
    </div>
    <div class="">
        <form method="POST" id="collectionForm">
            {% if collection %}
            <input type="hidden" name="last_updated_at" value="{{ collection.updated_at or collection.created_at }}">
            {% endif %}
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" {% if collection %}value="{{ collection.date.strftime('%Y-%m-%d') }}"{% endif %} required>
                </div>
                <div class="col-md-4">
                    <label for="customer_id" class="form-label">Customer <span class="text-danger">*</span></label>
                    <select class="form-select select2-ajax" id="customer_id" name="customer_id" {% if collection %}disabled{% else %}required{% endif %} data-url="{{ url_for('customer.search_customer') }}" data-placeholder="Select Customer">
                        {% if collection %}
                        <option value="{{ collection.customer_id }}" selected>{{ collection.customer.customer_name }}</option>
                        {% endif %}
                    </select>
                    {% if collection %}
                    <input type="hidden" name="customer_id" value="{{ collection.customer_id }}">
                    {% endif %}
                </div>
                <div class="col-md-4">
                    <label for="previous_due" class="form-label text-danger fw-bold">Previous Due</label>
                    <input type="text" class="form-control fw-bold" id="previous_due" readonly value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label text-muted">Total Collection Received</label>
                    <input type="text" class="form-control" id="total_collected" readonly value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-info fw-bold">Current Outstanding Balance</label>
                    <input type="text" class="form-control fw-bold" id="outstanding_balance" readonly value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="payment_method" class="form-label">Payment Method</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        <option value="Cash" {% if collection and collection.payment_method == 'Cash' %}selected{% endif %}>Cash</option>
                        <option value="Bank" {% if collection and collection.payment_method == 'Bank' %}selected{% endif %}>Bank</option>
                        <option value="Cheque" {% if collection and collection.payment_method == 'Cheque' %}selected{% endif %}>Cheque</option>
                        <option value="Mobile Banking" {% if collection and collection.payment_method == 'Mobile Banking' %}selected{% endif %}>Mobile Banking</option>
                    </select>
                </div>
                <div class="col-md-4 bank-details" style="display:none;">
                    <label for="bank_name" class="form-label">Bank Name</label>
                    <input type="text" class="form-control" id="bank_name" name="bank_name" {% if collection %}value="{{ collection.bank_name or '' }}"{% endif %}>
                </div>
                <div class="col-md-4 cheque-details" style="display:none;">
                    <label for="cheque_number" class="form-label">Cheque Number</label>
                    <input type="text" class="form-control" id="cheque_number" name="cheque_number" {% if collection %}value="{{ collection.cheque_number or '' }}"{% endif %}>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="discount" class="form-label">Discount</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input" id="discount" name="discount" value="{{ collection.discount if collection else '0' }}">
                </div>
                <div class="col-md-4">
                    <label for="cash_paid" class="form-label text-success fw-bold">Amount Paid</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input fw-bold" id="cash_paid" name="cash_paid" value="{{ collection.cash_paid if collection else '0' }}">
                    <div id="validation_msg" class="text-danger small mt-1" style="display:none;"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">Current Balance</label>
                    <input type="text" class="form-control fw-bold" id="balance" readonly value="0.00">
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-12">
                    <label for="note" class="form-label">Note</label>
                    <input type="text" class="form-control" id="note" name="note" {% if collection %}value="{{ collection.note or '' }}"{% endif %}>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn"><i class="fas fa-save"></i> Submit {{ action }}</button>
            <button type="button" class="btn btn-secondary btn-lg" onclick="location.reload();">Reset</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    $.ajaxSetup({ cache: false });
    
    let prevDue = 0;
    
    {% if collection %}
    prevDue = {{ collection.previous_due }};
    $('#previous_due').val(prevDue.toFixed(2));
    
    // Set initial total collected dynamically or to 0 since we're editing an old state
    // We avoid triggering customer AJAX because it pulls current due which includes this transaction.
    $('#payment_method').trigger('change');
    calculateTotals();
    {% else %}
    document.getElementById('date').valueAsDate = new Date();
    {% endif %}

    $('#customer_id').on('change', function() {
        let cid = $(this).val();
        if(cid) {
            $.get('{{ url_for("customer_collection.get_customer_due", customer_id=0) }}'.replace('/0', '/' + cid), function(data) {
                prevDue = parseFloat(data.due) || 0;
                let totalCollected = parseFloat(data.total_collected) || 0;

                $('#previous_due').val(prevDue.toFixed(2));
                $('#total_collected').val(totalCollected.toFixed(2));
                $('#outstanding_balance').val(prevDue.toFixed(2));

                // Reset input fields when customer changes
                $('#discount').val(0);
                $('#cash_paid').val(0);
                $('#validation_msg').hide();
                $('#submitBtn').prop('disabled', false);

                calculateTotals();
            });
        }
    });

    $('#payment_method').on('change', function() { 
        let method = $(this).val();
        if (method === 'Bank' || method === 'Cheque') {
            $('.bank-details').show();
        } else {
            $('.bank-details').hide();
        }
        
        if (method === 'Cheque') {
            $('.cheque-details').show();
        } else {
            $('.cheque-details').hide();
        }
    });

    $(document).on('input', '.calc-input', function() {
        calculateTotals(); 
    });
    
    function calculateTotals() {
        let discount = parseFloat($('#discount').val()) || 0;
        let paid = parseFloat($('#cash_paid').val()) || 0;

        let balance = prevDue - discount - paid;
        
        // Show advance balance as negative, so no clamping here.
        $('#balance').val(balance.toFixed(2));
        $('#outstanding_balance').val(balance.toFixed(2));
    }

    // Form submission validation
    $('#collectionForm').on('submit', function(e) {
        let discount = parseFloat($('#discount').val()) || 0;
        let paid = parseFloat($('#cash_paid').val()) || 0;
        
        // Allow overpayments (no validation against prevDue)
        
        if(paid <= 0 && discount <= 0) {
            e.preventDefault();
            alert('Please enter an Amount Paid or Discount.');
            return false;
        }
    });
});
</script>
{% endblock %}
