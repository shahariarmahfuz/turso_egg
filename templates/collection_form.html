{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <div class="mb-3 py-3">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Customer Collection</h6>
    </div>
    <div class="">
        <form method="POST" id="collectionForm">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="col-md-4">
                    <label for="customer_id" class="form-label">Customer <span class="text-danger">*</span></label>
                    <select class="form-select select2" id="customer_id" name="customer_id" required>
                        <option value="" disabled selected>Select Customer</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.customer_name }} ({{ c.contact_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="previous_due" class="form-label text-danger fw-bold">Previous Due</label>
                    <input type="text" class="form-control fw-bold" id="previous_due" readonly value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label text-muted">Total Collection Received</label>
                    <input type="text" class="form-control" id="total_collected" readonly value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-info fw-bold">Current Outstanding Balance</label>
                    <input type="text" class="form-control fw-bold" id="outstanding_balance" readonly value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="payment_method" class="form-label">Payment Method</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank</option>
                        <option value="Cheque">Cheque</option>
                        <option value="Mobile Banking">Mobile Banking</option>
                    </select>
                </div>
                <div class="col-md-4 bank-details" style="display:none;">
                    <label for="bank_name" class="form-label">Bank Name</label>
                    <input type="text" class="form-control" id="bank_name" name="bank_name">
                </div>
                <div class="col-md-4 cheque-details" style="display:none;">
                    <label for="cheque_number" class="form-label">Cheque Number</label>
                    <input type="text" class="form-control" id="cheque_number" name="cheque_number">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="discount" class="form-label">Discount</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input" id="discount" name="discount" value="0">
                </div>
                <div class="col-md-4">
                    <label for="cash_paid" class="form-label text-success fw-bold">Amount Paid</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input fw-bold" id="cash_paid" name="cash_paid" value="0">
                    <div id="validation_msg" class="text-danger small mt-1" style="display:none;"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">Current Balance</label>
                    <input type="text" class="form-control fw-bold" id="balance" readonly value="0.00">
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-12">
                    <label for="note" class="form-label">Note</label>
                    <input type="text" class="form-control" id="note" name="note">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn"><i class="fas fa-save"></i> Submit Collection</button>
            <button type="button" class="btn btn-secondary btn-lg" onclick="location.reload();">Reset</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    document.getElementById('date').valueAsDate = new Date();
    $('.select2').select2({ theme: 'bootstrap-5' });

    let prevDue = 0;

    $('#customer_id').on('change', function() {
        let cid = $(this).val();
        if(cid) {
            $.get('/customer_collection/api/get_customer_due/' + cid, function(data) {
                prevDue = parseFloat(data.due) || 0;
                let totalCollected = parseFloat(data.total_collected) || 0;

                $('#previous_due').val(prevDue.toFixed(2));
                $('#total_collected').val(totalCollected.toFixed(2));
                $('#outstanding_balance').val(prevDue.toFixed(2));

                // Reset input fields when customer changes
                $('#discount').val(0);
                $('#cash_paid').val(0);
                $('#validation_msg').hide();
                $('#submitBtn').prop('disabled', false);

                calculateTotals();
            });
        }
    });

    $('#payment_method').on('change', function() { 
        let method = $(this).val();
        if (method === 'Bank' || method === 'Cheque') {
            $('.bank-details').show();
        } else {
            $('.bank-details').hide();
        }
        
        if (method === 'Cheque') {
            $('.cheque-details').show();
        } else {
            $('.cheque-details').hide();
        }
    });

    $(document).on('input', '.calc-input', function() {
        calculateTotals(); 
    });
    
    function calculateTotals() {
        let discount = parseFloat($('#discount').val()) || 0;
        let paid = parseFloat($('#cash_paid').val()) || 0;
        let maxAllowed = prevDue - discount;
        
        if(maxAllowed < 0) maxAllowed = 0;

        if(discount + paid > prevDue + 0.005) {
            let msg = 'Discount + Paid Amount (' + (discount + paid).toFixed(2) + ') cannot exceed Previous Due (' + prevDue.toFixed(2) + ')!';
            $('#validation_msg').text(msg).show();
            $('#submitBtn').prop('disabled', true);

            // Clamp the active field
            if($(document.activeElement).attr('id') === 'cash_paid') {
                paid = maxAllowed;
                $('#cash_paid').val(paid > 0 ? paid.toFixed(2) : 0);
            } else {
                discount = prevDue - paid;
                if(discount < 0) discount = 0;
                $('#discount').val(discount.toFixed(2));
            }
            // Recalculate after clamping
            discount = parseFloat($('#discount').val()) || 0;
            paid = parseFloat($('#cash_paid').val()) || 0;
            $('#validation_msg').hide();
            $('#submitBtn').prop('disabled', false);
        } else {
            $('#validation_msg').hide();
            $('#submitBtn').prop('disabled', false);
        }

        let balance = prevDue - discount - paid;
        if(balance < 0) balance = 0;
        $('#balance').val(balance.toFixed(2));
        $('#outstanding_balance').val(balance.toFixed(2));
    }

    // Form submission validation
    $('#collectionForm').on('submit', function(e) {
        let discount = parseFloat($('#discount').val()) || 0;
        let paid = parseFloat($('#cash_paid').val()) || 0;
        
        if(discount + paid > prevDue + 0.005) {
            e.preventDefault();
            alert('Discount + Paid Amount cannot exceed Previous Due!');
            return false;
        }
        
        if(paid <= 0 && discount <= 0) {
            e.preventDefault();
            alert('Please enter an Amount Paid or Discount.');
            return false;
        }
    });
});
</script>
{% endblock %}
