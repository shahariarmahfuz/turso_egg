{% extends "layout.html" %}
{% block page_title %}Add User{% endblock %}
{% block page_subtitle %}Create a new system user{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold">User Information</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('users.add_user') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold text-xs">NAME</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold text-xs">USERNAME</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold text-xs">EMAIL</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold text-xs">PHONE NUMBER</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold text-xs">ROLE</label>
                        <select name="role" class="form-select" required>
                            <option value="Employee">Employee</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold text-xs">PASSWORD</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Create User</button>
                        <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
