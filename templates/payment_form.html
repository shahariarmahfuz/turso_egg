{% extends "layout.html" %}
{% block content %}
<div class="card shadow mb-4">
    <div class="card-header py-3 bg-white">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Supplier Payment</h6>
    </div>
    <div class="card-body">
        <form method="POST" id="paymentForm">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="col-md-4">
                    <label for="supplier_id" class="form-label">Supplier <span class="text-danger">*</span></label>
                    <select class="form-select select2" id="supplier_id" name="supplier_id" required>
                        <option value="" disabled selected>Select Supplier</option>
                        {% for c in suppliers %}
                        <option value="{{ c.id }}" {% if pre_supplier_id == c.id|string %}selected{% endif %}>{{ c.supplier_name }} ({{ c.contact_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="previous_due" class="form-label text-danger fw-bold">Previous Due</label>
                    <input type="text" class="form-control fw-bold" id="previous_due" readonly value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="payment_method" class="form-label">Payment Method</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank</option>
                        <option value="Cheque">Cheque</option>
                        <option value="Mobile Banking">Mobile Banking</option>
                    </select>
                </div>
                <div class="col-md-4 bank-details" style="display:none;">
                    <label for="bank_name" class="form-label">Bank Name</label>
                    <input type="text" class="form-control" id="bank_name" name="bank_name">
                </div>
                <div class="col-md-4 cheque-details" style="display:none;">
                    <label for="cheque_number" class="form-label">Cheque Number</label>
                    <input type="text" class="form-control" id="cheque_number" name="cheque_number">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="discount" class="form-label">Discount</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input" id="discount" name="discount" value="0">
                </div>
                <div class="col-md-4">
                    <label for="cash_paid" class="form-label text-success fw-bold">Amount Paid</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input fw-bold" id="cash_paid" name="cash_paid" value="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">Current Balance</label>
                    <input type="text" class="form-control fw-bold" id="balance" readonly value="0.00">
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-12">
                    <label for="note" class="form-label">Note</label>
                    <input type="text" class="form-control" id="note" name="note">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Submit Payment</button>
            <button type="button" class="btn btn-secondary btn-lg" onclick="location.reload();">Reset</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    document.getElementById('date').valueAsDate = new Date();
    $('.select2').select2({ theme: 'bootstrap-5' });

    let prevDue = 0;

    $('#supplier_id').on('change', function() {
        let cid = $(this).val();
        if(cid) {
            $.get('/supplier_payment/api/get_supplier_due/' + cid, function(data) {
                prevDue = parseFloat(data.due) || 0;
                $('#previous_due').val(prevDue.toFixed(2));
                calculateTotals();
            });
        }
    });

    // Trigger change if a supplier is pre-selected
    if ($('#supplier_id').val()) {
        $('#supplier_id').trigger('change');
    }

    $('#payment_method').on('change', function() { 
        let method = $(this).val();
        if (method === 'Bank' || method === 'Cheque') {
            $('.bank-details').show();
        } else {
            $('.bank-details').hide();
        }
        
        if (method === 'Cheque') {
            $('.cheque-details').show();
        } else {
            $('.cheque-details').hide();
        }
    });

    $(document).on('input', '.calc-input', function() {
        calculateTotals(); 
    });
    
    function calculateTotals() {
        let discount = parseFloat($('#discount').val()) || 0;
        let paid = parseFloat($('#cash_paid').val()) || 0;
        
        if(discount + paid > prevDue) {
            alert("Discount + Paid Amount cannot exceed Previous Due!");
            if($(document.activeElement).attr('id') === 'cash_paid') {
                $('#cash_paid').val(0);
            } else {
                $('#discount').val(0);
            }
            discount = parseFloat($('#discount').val()) || 0;
            paid = parseFloat($('#cash_paid').val()) || 0;
        }

        let balance = prevDue - discount - paid;
        if(balance < 0) balance = 0;
        $('#balance').val(balance.toFixed(2));
    }
});
</script>
{% endblock %}
