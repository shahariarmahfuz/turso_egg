{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <div class="mb-3 py-3">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Sale Return</h6>
    </div>
    <div class="">
        <form method="POST" id="returnForm">
            <h5 class="mb-3 border-bottom pb-2">Customer & Invoice Information</h5>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="customer_id" class="form-label">Customer <span class="text-danger">*</span></label>
                    <select class="form-select select2-ajax" id="customer_id" name="customer_id" required data-url="{{ url_for('customer.search_customer') }}" data-placeholder="Select Customer">
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="sale_invoice" class="form-label">Sale Invoice <span class="text-danger">*</span></label>
                    <select class="form-select select2" id="sale_invoice" name="sale_invoice" required disabled>
                        <option value="" disabled selected>Select Customer First</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="date" class="form-label">Return Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
            </div>

            <div class="table-responsive mb-4 mt-4">
                <table class="table table-bordered table-sm" id="returnTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Product Code</th>
                            <th>Product Name</th>
                            <th>Sold Qty</th>
                            <th>Already Returned</th>
                            <th>Max Return</th>
                            <th width="15%">Return Qty</th>
                            <th width="15%">Sale Price</th>
                            <th width="15%">Total</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="product_rows">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="7" class="text-end">Subtotal:</td>
                            <td><input type="text" class="form-control form-control-sm fw-bold" id="subtotal" readonly value="0.00"></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <h5 class="mb-3 border-bottom pb-2 mt-4">Payment & Summary</h5>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="payment_method" class="form-label">Payment Method</label>
                    <select class="form-select" id="payment_method" name="payment_method">
                        <option value="Cash">Cash</option>
                        <option value="Due">Due</option>
                        <option value="Card">Card</option>
                        <option value="Mobile Banking">Mobile Banking</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label for="note" class="form-label">Note</label>
                    <input type="text" class="form-control" id="note" name="note">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <label for="discount" class="form-label">Discount</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input" id="discount" name="discount" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-danger">Grand Total (Refund Amount)</label>
                    <input type="text" class="form-control fw-bold" id="grand_total" readonly value="0.00">
                </div>
                <div class="col-md-3">
                    <label for="cash_paid" class="form-label text-success fw-bold">Cash Refunded</label>
                    <input type="number" step="0.01" min="0" class="form-control calc-input fw-bold" id="cash_paid" name="cash_paid" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-danger fw-bold">Adjust to Due</label>
                    <input type="text" class="form-control fw-bold" id="due_amount" readonly value="0.00">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Submit Return</button>
            <button type="button" class="btn btn-secondary btn-lg" onclick="location.reload();">Reset</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    document.getElementById('date').valueAsDate = new Date();
    $('#sale_invoice').select2({ theme: 'bootstrap-5' });

    $('#customer_id').on('change', function() {
        let cid = $(this).val();
        $('#sale_invoice').empty().append('<option value="" disabled selected>Loading...</option>');
        $('#product_rows').empty();
        calculateTotals();
        
        if(cid) {
            $.get('{{ url_for("sale_return.get_sales", customer_id=0) }}'.replace('/0', '/' + cid), function(data) {
                $('#sale_invoice').empty().append('<option value="" disabled selected>Select Invoice</option>');
                data.forEach(function(s) {
                    $('#sale_invoice').append('<option value="'+s.invoice_no+'">'+s.invoice_no+' ('+s.date+')</option>');
                });
                $('#sale_invoice').prop('disabled', false);
            });
        }
    });

    $('#sale_invoice').on('change', function() {
        let inv = $(this).val();
        $('#product_rows').empty();
        calculateTotals();
        
        if(inv) {
            $.get('{{ url_for("sale_return.get_sale_items", invoice_no="dummy_inv") }}'.replace('dummy_inv', inv), function(data) {
                if(data.length === 0) {
                    alert("No products available to return for this invoice.");
                    return;
                }
                data.forEach(function(item) {
                    var row = `
                    <tr>
                        <td><input type="hidden" name="product_id[]" value="${item.product_id}">${item.code}</td>
                        <td>${item.name}</td>
                        <td>${item.sold_qty}</td>
                        <td>${item.returned_qty}</td>
                        <td>${item.remaining_qty}</td>
                        <td><input type="number" step="any" min="0" max="${item.remaining_qty}" class="form-control form-control-sm qty-input" name="quantity[]" value="0" required></td>
                        <td>
                            <input type="number" step="any" min="0" class="form-control form-control-sm price-input-display" value="${item.sale_price}" required>
                            <input type="hidden" class="price-input-hidden" name="price[]" value="${item.sale_price}">
                        </td>
                        <td>
                            <input type="number" step="any" min="0" class="form-control form-control-sm row-total-display" value="0.00">
                            <input type="hidden" class="row-total-hidden" value="0">
                        </td>
                        <td class="text-center"><button type="button" class="btn btn-danger btn-sm remove-row"><i class="fas fa-times"></i></button></td>
                    </tr>`;
                    $('#product_rows').append(row);
                });
            });
        }
    });

    $(document).on('click', '.remove-row', function() {
        $(this).closest('tr').remove();
        calculateTotals();
    });

    $(document).on('input', '.qty-input, .price-input-display', function() {
        if($(this).hasClass('qty-input')){
            let max = parseFloat($(this).attr('max'));
            let val = parseFloat($(this).val());
            if(val > max) { alert("Cannot return more than remaining sold quantity!"); $(this).val(max); }
            if(val < 0) { $(this).val(0); }
        }

        let tr = $(this).closest('tr');
        let qty = parseFloat(tr.find('.qty-input').val()) || 0;
        let price = parseFloat(tr.find('.price-input-display').val()) || 0;
        
        tr.find('.price-input-hidden').val(price);
        
        let total = qty * price;
        tr.find('.row-total-hidden').val(total);
        tr.find('.row-total-display').val(total.toFixed(2));
        
        calculateTotals();
    });

    $(document).on('input', '.row-total-display', function() {
        let tr = $(this).closest('tr');
        let total = parseFloat($(this).val()) || 0;
        let qty = parseFloat(tr.find('.qty-input').val()) || 0;
        
        tr.find('.row-total-hidden').val(total);
        
        if (qty !== 0) {
            let new_price = total / qty;
            tr.find('.price-input-hidden').val(new_price);
            tr.find('.price-input-display').val(new_price.toFixed(2));
        } else {
            tr.find('.price-input-hidden').val(0);
            tr.find('.price-input-display').val(0);
        }
        
        calculateTotals();
    });

    $(document).on('focus', '.price-input-display, .row-total-display', function() {
        let tr = $(this).closest('tr');
        if ($(this).hasClass('price-input-display')) {
            let exact = parseFloat(tr.find('.price-input-hidden').val()) || 0;
            $(this).val(exact);
        } else if ($(this).hasClass('row-total-display')) {
            let exact = parseFloat(tr.find('.row-total-hidden').val()) || 0;
            $(this).val(exact);
        }
    });

    $(document).on('blur', '.price-input-display, .row-total-display', function() {
        let val = parseFloat($(this).val()) || 0;
        $(this).val(val.toFixed(2));
    });

    $(document).on('input', '.calc-input', function() {
        calculateTotals(); 
    });
    
    $('#payment_method').on('change', function() { calculateTotals(); });

    function calculateTotals() {
        let subtotal = 0;
        $('#product_rows tr').each(function() {
            let total = parseFloat($(this).find('.row-total-hidden').val()) || 0;
            subtotal += total;
        });
        $('#subtotal').val(subtotal.toFixed(2));

        let discount = parseFloat($('#discount').val()) || 0;
        let grandTotal = subtotal - discount;
        if(grandTotal < 0) grandTotal = 0;
        $('#grand_total').val(grandTotal.toFixed(2));

        let isCash = $('#payment_method').val() === 'Cash';
        if(isCash) { $('#cash_paid').val(grandTotal.toFixed(2)); }

        let paid = parseFloat($('#cash_paid').val()) || 0;
        let due = grandTotal - paid;
        if(due < 0) due = 0;
        $('#due_amount').val(due.toFixed(2));
    }
});
</script>
{% endblock %}
