<nav aria-label="Page navigation" class="mt-3">
    <ul class="pagination justify-content-center">
        <li class="page-item {% if not page_obj.has_prev %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(request.endpoint, page=page_obj.prev_num, **request.view_args) if page_obj.has_prev else '#' }}">Previous</a>
        </li>
        {% for page_num in page_obj.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
            {% if page_num %}
                <li class="page-item {% if page_num == page_obj.page %}active{% endif %}">
                    <a class="page-link" href="{{ url_for(request.endpoint, page=page_num, **request.view_args) }}">{{ page_num }}</a>
                </li>
            {% else %}
                <li class="page-item disabled"><span class="page-link">...</span></li>
            {% endif %}
        {% endfor %}
        <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(request.endpoint, page=page_obj.next_num, **request.view_args) if page_obj.has_next else '#' }}">Next</a>
        </li>
    </ul>
</nav>
