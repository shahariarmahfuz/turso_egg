{% extends "base.html" %}
{% block content %}
<div class="mb-4">
    <div class="mb-3 py-3">
        <h6 class="m-0 font-weight-bold text-primary">{{ action }} Supplier</h6>
    </div>
    <div class="">
        <form method="POST">
            {% if supplier %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label text-muted">Supplier Code</label>
                    <input type="text" class="form-control" value="{{ supplier.supplier_code }}" disabled readonly>
                </div>
            </div>
            {% endif %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="supplier_name" class="form-label">Supplier Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="supplier_name" name="supplier_name" required value="{{ supplier.supplier_name if supplier else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="contact_number" class="form-label">Contact Number</label>
                    <input type="text" class="form-control" id="contact_number" name="contact_number" value="{{ supplier.contact_number if supplier else '' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="address" class="form-label">Address</label>
                    <textarea class="form-control" id="address" name="address" rows="2">{{ supplier.address if supplier else '' }}</textarea>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="previous_balance" class="form-label">Previous Balance</label>
                    <input type="number" step="0.01" class="form-control" id="previous_balance" name="previous_balance" value="{{ supplier.previous_balance if supplier else '0.00' }}">
                </div>
                <div class="col-md-6">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date" 
                           value="{{ supplier.created_date.strftime('%Y-%m-%d') if supplier else '' }}">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">{{ action }} Supplier</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <a href="{{ url_for('supplier.manage_supplier') }}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        {% if not supplier %}
        document.getElementById('date').valueAsDate = new Date();
        {% endif %}
    });
</script>
{% endblock %}
